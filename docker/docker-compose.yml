version: '3.8'

services:
  # PHP-FPM Service
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: neogiga_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage/app/public:/var/www/html/storage/app/public
    networks:
      - neogiga_network
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=neogiga
      - DB_USERNAME=neogiga
      - DB_PASSWORD=neogiga_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis

  # Nginx Web Server
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: neogiga_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./storage/app/public:/var/www/html/storage/app/public
    networks:
      - neogiga_network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: neogiga_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: neogiga
      MYSQL_USER: neogiga
      MYSQL_PASSWORD: neogiga_secret
      MYSQL_ROOT_PASSWORD: neogiga_root_secret
    volumes:
      - neogiga_mysql_data:/var/lib/mysql
    networks:
      - neogiga_network
    ports:
      - "3306:3306"

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: neogiga_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - neogiga_redis_data:/data
    networks:
      - neogiga_network
    command: redis-server --appendonly yes

  # Laravel Queue Worker
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: neogiga_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - neogiga_network
    depends_on:
      - db
      - redis
    command: php artisan queue:work --tries=3 --timeout=90

  # Laravel Scheduler
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: neogiga_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - neogiga_network
    depends_on:
      - db
      - redis
    command: php artisan schedule:work

networks:
  neogiga_network:
    driver: bridge

volumes:
  neogiga_mysql_data:
  neogiga_redis_data:
