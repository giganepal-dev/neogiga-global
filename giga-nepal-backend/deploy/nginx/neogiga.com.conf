# neogiga.com — primary NeoGiga vhost

# Main storefront/regional hosts: HTTP -> HTTPS
server {
    listen 80;
    server_name neogiga.com www.neogiga.com
                np.neogiga.com in.neogiga.com bd.neogiga.com
                bt.neogiga.com pk.neogiga.com lk.neogiga.com au.neogiga.com;

    location /.well-known/ {
        root /var/www/html;
    }

    location / {
        limit_rate $bot_limit_rate;
        return 301 https://$host$request_uri;
    }
}

# Mail/webmail hosts: HTTP -> HTTPS using the mail certificate vhost below.
server {
    listen 80;
    server_name mail.neogiga.com webmail.neogiga.com;

    location /.well-known/ {
        root /var/www/html;
    }

    location / {
        limit_rate $bot_limit_rate;
        return 301 https://$host$request_uri;
    }
}

# Mail host: redirect browser users to webmail. SMTP/IMAP stay on Postfix/Dovecot.
server {
    listen 443 ssl http2;
    server_name mail.neogiga.com;

    ssl_certificate /etc/letsencrypt/live/mail.neogiga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.neogiga.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://webmail.neogiga.com$request_uri;
}

# NeoGiga browser webmail login.
server {
    listen 443 ssl http2;
    server_name webmail.neogiga.com;

    root /var/lib/roundcube/public_html;
    index index.php index.html;
    # Block classified bots — see conf.d/01-bot-rate-limit.conf for map.
    # Social crawlers (Facebook, Twitter, LinkedIn, etc.) are allowed for link previews.
    if ($bot_action = "block") {
        return 403;
    }

    ssl_certificate /etc/letsencrypt/live/mail.neogiga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.neogiga.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    location / {
        limit_rate $bot_limit_rate;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/(README|INSTALL|LICENSE|CHANGELOG|UPGRADING)$ {
        deny all;
    }

    location ~ ^/(config|temp|logs)/ {
        deny all;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-neogiga.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}

# neogiga.com — HTTPS primary site
server {
    listen 443 ssl http2;
    server_name neogiga.com www.neogiga.com
                np.neogiga.com in.neogiga.com bd.neogiga.com
                bt.neogiga.com pk.neogiga.com lk.neogiga.com au.neogiga.com;

    root /home/neogiga/neogiga-global/giga-nepal-backend/public;
    index index.php index.html;
    # Block classified bots — see conf.d/01-bot-rate-limit.conf for map.
    # Social crawlers (Facebook, Twitter, LinkedIn, etc.) are allowed for link previews.
    if ($bot_action = "block") {
        return 403;
    }

    ssl_certificate /etc/letsencrypt/live/neogiga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neogiga.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    if ($host = www.neogiga.com) {
        return 301 https://neogiga.com$request_uri;
    }

    location ^~ /api/v1/ai-catalog/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/api(/|$) {
        return 302 https://backend.neogiga.com$request_uri;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location / {
        limit_rate $bot_limit_rate;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-neogiga.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 600;

        # FastCGI cache — serve static pages without PHP/DB
        fastcgi_cache NGXCACHE;
        fastcgi_cache_key $scheme$request_method$host$request_uri;
        # Cache only successful document responses. Authentication redirects
        # and other stateful redirects must always be evaluated by Laravel.
        fastcgi_cache_valid 200 60m;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_bypass $cookie_neogiga_session $http_authorization;
        # Keep Laravel's Cache-Control, Expires and Set-Cookie semantics intact.
        # In particular, never store a response that starts or rotates a session.
        fastcgi_no_cache $cookie_neogiga_session $http_authorization $upstream_http_set_cookie;
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        add_header X-Cache $upstream_cache_status;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(ico|css|js|gif|jpe?g|png|webp|svg|woff2?|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    client_max_body_size 256M;
}
