# Bot classification and rate limiting
# "block" = return 403 (malicious/scraping bots)
# "throttle" = rate-limited access (legitimate but heavy crawlers)
# "allow" = full-speed access (verified search/social crawlers)
map $http_user_agent $bot_action {
    default                         "";

    # === Verified social-media crawlers — full access for link previews ===
    # Facebook / Meta / Instagram / Messenger / WhatsApp
    "~*facebookexternalhit"         "allow";
    "~*Facebot"                     "allow";
    "~*meta-externalagent"          "allow";
    "~*meta-externalfetcher"        "allow";
    # Twitter / X
    "~*Twitterbot"                  "allow";
    # LinkedIn
    "~*LinkedInBot"                 "allow";
    # Slack
    "~*Slackbot"                    "allow";
    # Discord
    "~*Discordbot"                  "allow";
    # Telegram
    "~*TelegramBot"                 "allow";
    # Pinterest
    "~*Pinterestbot"                "allow";

    # === Verified search engines — full access ===
    "~*Googlebot"                   "allow";
    "~*Bingbot"                     "allow";

    # === AI crawlers — throttled (legitimate but heavy) ===
    "~*GPTBot"                      "throttle";
    "~*ClaudeBot"                   "throttle";
    "~*PerplexityBot"               "throttle";
    "~*GoogleOther"                 "throttle";

    # === Heavy/generic crawlers — throttled ===
    "~*Amazonbot"                   "throttle";

    # === Catch-all for unknown bots/crawlers/spiders — throttled ===
    "~*bot"                         "throttle";
    "~*crawler"                     "throttle";
    "~*spider"                      "throttle";
    "~*scraper"                     "throttle";
}

map $http_user_agent $bot_limit_rate {
    default 0;
    # Apply 50k rate limit to non-verified bots
    "~*(bot|crawler|spider|scraper|GoogleOther|GPTBot|ClaudeBot|Amazonbot)" 50k;
}
